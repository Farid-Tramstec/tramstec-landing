<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3a3a"/>
      <stop offset="1" stop-color="#1a5252"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7d8b8"/>
      <stop offset="1" stop-color="#c9b27e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark (top-left): folded T monogram -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="68" height="68" rx="14" fill="#e7d8b8"/>
    <path d="M16 22 H 52 M 34 22 V 56" stroke="#0f3a3a" stroke-width="6" stroke-linecap="square"/>
    <path d="M16 50 H 26" stroke="#c9b27e" stroke-width="6" stroke-linecap="square"/>
  </g>

  <!-- Wordmark -->
  <text x="170" y="128" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#e7d8b8">TramsTec</text>

  <!-- Tag -->
  <text x="170" y="162" font-family="JetBrains Mono, monospace" font-size="16" fill="#9bb7b7" letter-spacing="2">WHATSAPP COMMERCE MCP · MÉXICO</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Conecta tu IA</text>
  <text x="80" y="402" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff">a WhatsApp.</text>

  <!-- Subhead -->
  <text x="80" y="478" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="url(#accent)">El puente entre tu agente y WhatsApp Business.</text>

  <!-- Bottom row: chip pills -->
  <g transform="translate(80,544)">
    <rect x="0" y="0" rx="20" ry="20" width="180" height="40" fill="rgba(255,255,255,0.08)" stroke="rgba(231,216,184,0.3)"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e7d8b8">SPEI · OXXO · Tarjeta</text>

    <rect x="200" y="0" rx="20" ry="20" width="140" height="40" fill="rgba(255,255,255,0.08)" stroke="rgba(231,216,184,0.3)"/>
    <text x="270" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e7d8b8">CFDI 4.0</text>

    <rect x="360" y="0" rx="20" ry="20" width="230" height="40" fill="rgba(255,255,255,0.08)" stroke="rgba(231,216,184,0.3)"/>
    <text x="475" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e7d8b8">Claude · GPT · Gemini · n8n</text>
  </g>

  <!-- Right side: stylized conversation snippet -->
  <g transform="translate(720,200)">
    <rect x="0" y="0" width="400" height="270" rx="18" fill="#08272a" stroke="rgba(231,216,184,0.15)"/>
    <circle cx="22" cy="22" r="6" fill="#ef4444"/>
    <circle cx="44" cy="22" r="6" fill="#f59e0b"/>
    <circle cx="66" cy="22" r="6" fill="#10b981"/>
    <text x="120" y="28" font-family="JetBrains Mono, monospace" font-size="12" fill="#9bb7b7">order #A-2041 · mcp.tramstec</text>

    <text x="22" y="78" font-family="JetBrains Mono, monospace" font-size="16" fill="#9bb7b7">cliente:</text>
    <text x="22" y="100" font-family="JetBrains Mono, monospace" font-size="16" fill="#e7d8b8">"quiero 2 kg de tortillas"</text>

    <text x="22" y="134" font-family="JetBrains Mono, monospace" font-size="16" fill="#9bb7b7">ia:</text>
    <text x="22" y="156" font-family="JetBrains Mono, monospace" font-size="16" fill="#e7d8b8">"$50. ¿Confirmas?"</text>

    <text x="22" y="190" font-family="JetBrains Mono, monospace" font-size="16" fill="#9bb7b7">cliente:</text>
    <text x="22" y="212" font-family="JetBrains Mono, monospace" font-size="16" fill="#e7d8b8">"sí"</text>

    <text x="22" y="246" font-family="JetBrains Mono, monospace" font-size="16" fill="#10b981">✓ pedido · ✓ pago · ✓ entrega</text>
  </g>
</svg>
