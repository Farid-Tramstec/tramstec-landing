<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preparando tu cuenta — TramsTec</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="main" class="section">
      <div class="container" style="max-width: 560px; text-align: center;">
        <h1 class="section-title" id="title">Preparando tu cuenta…</h1>
        <p class="section-lede" id="lede">
          Recibimos tu pago. En unos minutos te llega un correo con todo lo que necesitas para empezar.
        </p>

        <div class="cart-panel" style="text-align: left; max-width: 420px; margin: 32px auto;">
          <div class="cart-lines">
            <div class="cart-line"><span>Pago</span><strong id="row-pay">…</strong></div>
            <div class="cart-line"><span>Cuenta</span><strong id="row-prov">…</strong></div>
            <div class="cart-line"><span>Correo enviado</span><strong id="row-email">…</strong></div>
          </div>
        </div>

        <p style="font-size: 14px; color: var(--color-text-muted);">
          ¿No llegó el correo? Revisa spam o escríbenos a
          <a href="mailto:soporte@tramstec.com">soporte@tramstec.com</a> con el ID
          <code id="signup-id-text">—</code>.
        </p>
        <p>
          <a class="btn btn-ghost" href="index.html">Volver al inicio</a>
        </p>
      </div>
    </main>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("signup");
        const apiBase = window.WCM_API_BASE || "http://localhost:3001";
        const idEl = document.getElementById("signup-id-text");
        if (id) idEl.textContent = id;

        if (!id) {
          document.getElementById("title").textContent = "Falta información";
          document.getElementById("lede").textContent = "Si llegaste aquí desde un pago, escríbenos.";
          return;
        }

        const rowPay = document.getElementById("row-pay");
        const rowProv = document.getElementById("row-prov");
        const rowEmail = document.getElementById("row-email");

        function paint(s) {
          switch (s.status) {
            case "pending":
              rowPay.textContent = "pendiente"; rowProv.textContent = "—"; rowEmail.textContent = "—"; break;
            case "paid":
              rowPay.textContent = "✓"; rowProv.textContent = "preparando…"; rowEmail.textContent = "—"; break;
            case "provisioning":
              rowPay.textContent = "✓"; rowProv.textContent = "preparando…"; rowEmail.textContent = "—"; break;
            case "provisioned":
              rowPay.textContent = "✓"; rowProv.textContent = "✓"; rowEmail.textContent = "✓";
              document.getElementById("title").textContent = "¡Listo! Revisa tu correo.";
              document.getElementById("lede").textContent = "Te enviamos las credenciales a " + (s.email || "tu correo") + ".";
              break;
            case "failed":
              document.getElementById("title").textContent = "Hubo un problema";
              document.getElementById("lede").textContent = "El pago se procesó pero algo salió mal. Escríbenos a soporte@tramstec.com con tu ID.";
              rowPay.textContent = "✓"; rowProv.textContent = "✗"; rowEmail.textContent = "—"; break;
            case "refunded":
              document.getElementById("title").textContent = "Pago reembolsado";
              document.getElementById("lede").textContent = "Tu pago fue reembolsado y la cuenta se desactivó."; break;
            case "not_found":
              document.getElementById("title").textContent = "Compra no encontrada";
              document.getElementById("lede").textContent = "Verifica el ID o escríbenos."; break;
          }
        }

        let attempts = 0;
        const MAX = 90;
        function poll() {
          attempts++;
          fetch(`${apiBase}/public/checkout/status/${encodeURIComponent(id)}`)
            .then((r) => r.json())
            .then((s) => {
              paint(s);
              if (["provisioned", "failed", "refunded", "not_found"].includes(s.status)) return;
              if (attempts < MAX) setTimeout(poll, 3000);
            })
            .catch(() => { if (attempts < MAX) setTimeout(poll, 5000); });
        }
        poll();
      })();
    </script>
  </body>
</html>
